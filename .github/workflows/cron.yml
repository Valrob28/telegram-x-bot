name: NODZ Bot

on:
  schedule:
    - cron: "*/15 * * * *" # toutes les 15 min
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node index.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PIN_ROADMAP: "1"
          # Optionnel : URL d’un flux RSS réel pour @Nodz_io (rsshub.app/public bloque souvent Twitter).
          RSS_URL: ${{ secrets.RSS_URL }}

      - name: Commit tweets.json & roadmap_hash.txt
        run: |
          git config --global user.name "nodz-bot"
          git config --global user.email "bot@nodz.io"
          git add tweets.json roadmap_hash.txt
          [ -f roadmap_pin_id.txt ] && git add roadmap_pin_id.txt || true
          [ -f telegram_chat_id.txt ] && git add telegram_chat_id.txt || true
          git diff --staged --quiet || git commit -m "update tracked tweets & roadmap hash"
          # Évite l’échec si origin/main a avancé (autre run, push manuel) pendant le job
          git pull --rebase origin main
          git push
