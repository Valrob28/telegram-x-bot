name: NODZ Bot

on:
  schedule:
    - cron: "*/15 * * * *" # toutes les 15 min
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node index.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PIN_ROADMAP: "1"

      - name: Commit tweets.json & roadmap_hash.txt
        run: |
          git config --global user.name "nodz-bot"
          git config --global user.email "bot@nodz.io"
          git add tweets.json roadmap_hash.txt
          [ -f roadmap_pin_id.txt ] && git add roadmap_pin_id.txt || true
          git commit -m "update tracked tweets & roadmap hash" || echo "no changes"
          git push
